<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Security Warning</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #fff;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      text-align: center;
      width: 400px;
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
    }

    .icon {
      font-size: 50px;
      color: red;
      margin-bottom: 10px;
    }

    h1 {
      color: #ff4d4d;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 20px;
    }

    .url {
      font-size: 12px;
      color: #888;
      word-break: break-all;
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    .back {
      background: #444;
      color: white;
    }

    .back:hover {
      background: #666;
    }

    .continue {
      background: #16a34a;
      color: white;
    }

    .continue:hover {
      background: #22c55e;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="icon">⚠️</div>
    <h1>Phishing Website Detected</h1>
    <p>This website may steal your personal data.</p>

    <div class="url" id="urlDisplay"></div>

    <button class="btn back" onclick="goBack()">Go Back</button>
    <button class="btn continue" onclick="continueAnyway()">Continue Anyway</button>
  </div>

  <script>
    const url = new URLSearchParams(window.location.search).get("url");
    document.getElementById("urlDisplay").innerText = url;

    function goBack() {
      window.history.back();
    }

    function continueAnyway() {
      window.location.href = url;
    }
  </script>

</body>
</html>
