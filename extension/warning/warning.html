<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Security Warning</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background particles -->
<canvas id="particles"></canvas>

<!-- Glass Card -->
<div class="card">
  <h1 id="title">Phishing Website Detected</h1>
  <p class="subtitle" id="subtitle">This website may be dangerous</p>

  <div class="meter">
    <div class="meter-fill" id="meterFill"></div>
  </div>

  <p id="confidenceText">Risk Level: 0%</p>

  <ul id="explanation"></ul>

  <div class="buttons">
    <button id="goBack">Go Back</button>
    <button id="continue">Proceed Anyway</button>
  </div>
</div>

<script src="warning.js"></script>
</body>
</html>
